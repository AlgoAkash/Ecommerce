<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Store</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-gray-100">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center">

            <a href="index.html" class="text-3xl font-bold text-indigo-600">
                ShopEase
            </a>

            <div class="hidden md:block w-1/3">
                <input id="search" type="text" placeholder="Search products..."
                    class="w-full border rounded-full px-5 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="flex gap-6 items-center">
                <a href="index.html" class="hover:text-indigo-600">
                    Home
                </a>

                <a href="cart.html" class="relative">
                    <i class="fa-solid fa-cart-shopping text-2xl"></i>
                    <span id="cartCount"
                        class="absolute -top-2 -right-3 bg-red-500 text-white rounded-full px-2 text-xs">
                        0
                    </span>
                </a>
            </div>
        </div>
    </nav>
    <section class="bg-indigo-600 text-white py-16">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-5xl font-bold mb-4">
                Discover Amazing Products

            </h1>
            <p class="text-lg" :>
                Best prices. Amazing discounts. Fast delivery.
            </p>

        </div>
    </section>
    <div id="loader" class="flex justify-center items-center py-16">
        <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin">
        </div>

    </div>

    <div id="products"
        class="max-w-7xl mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
    </div>

    <footer class="bg-white mt-10 py-6 shadow-inner">
        <div class="text-center text-gray-600">
            © 2026 ShopEase
        </div>

    </footer>
    <script src="app.js"></script>
</body>

</html>
