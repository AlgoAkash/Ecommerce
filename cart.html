<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-gray-100">

<nav class="bg-white shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto flex justify-between items-center p-5">
<a href="index.html"
class="text-3xl font-bold text-indigo-600">
ShopEase
</a>
<a href="index.html"
class="text-indigo-600 font-semibold">
← Continue Shopping
</a>
</div>
</nav>

<div class="max-w-7xl mx-auto p-6 grid lg:grid-cols-3 gap-8">

<div id="cartItems"
class="lg:col-span-2 space-y-5">
</div>

<div>
<div class="bg-white rounded-xl shadow p-6 sticky top-24">

<h2 class="text-2xl font-bold mb-6">
Bill Summary
</h2>

<div class="space-y-4">

<div class="flex justify-between">
<span>Items</span>
<span id="itemCount">0</span>
</div>
<div class="flex justify-between">
<span>Subtotal</span>
<span id="subtotal">$0</span>
</div>

<div class="flex justify-between text-green-600">
<span>Discount (10%)</span>
<span id="discount">$0</span>
</div>

<div class="flex justify-between">
<span>Delivery</span>
<span>$20</span>
</div>
<hr>

<div class="flex justify-between text-2xl font-bold">
<span>Total</span>
<span id="total">$0</span>
</div>

<button
id="checkoutBtn"
class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl">
Checkout
</button>

</div>
</div>
</div>
</div>

<script src="js/cart.js"></script>
</body>
</html>
